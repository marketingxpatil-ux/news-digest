name: Daily News Digest

on:
  schedule:
    # Runs at 1:30 AM UTC = 7:00 AM IST every day
    - cron: '30 1 * * *'
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

permissions:
  contents: write  # Required to commit index.html back to repo

jobs:
  build-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser google-generativeai

      - name: Run digest script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python digest.py

      - name: Commit and push updated digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily digest: $(date +'%Y-%m-%d')"
          git push
